<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio & Blog</title>
    <style>
        /* --- ARCHITECTURE --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-color: #f7f7f7;
            --text-color: #111111;
            --text-muted: #767676;
            --border-color: #e0e0e0;
            --font-mono: "Courier New", Courier, monospace;
            --font-sans: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
            --grid-gap: 8px;
            --modal-bg: rgba(247, 247, 247, 0.98);
        }
        body.dark-theme {
            --bg-color: #0b0b0b;
            --text-color: #eeeeee;
            --text-muted: #888888;
            --border-color: #222222;
            --modal-bg: rgba(11, 11, 11, 0.98);
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-sans);
            font-size: 13px;
            line-height: 1.6;
            letter-spacing: -0.01em;
            padding: 3vw;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        body.modal-open { overflow: hidden; }
        a { color: inherit; text-decoration: none; cursor: pointer; }
        .mono { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; }

        /* --- HEADER & NAVIGATION --- */
        header {
            display: flex; justify-content: space-between; align-items: baseline;
            margin-bottom: 8vh; border-bottom: 1px solid var(--border-color); padding-bottom: 1.5rem;
        }
        .logo { font-weight: 600; font-size: 14px; letter-spacing: 0.1em; }
        nav { display: flex; gap: 2rem; }
        .nav-link { color: var(--text-muted); transition: color 0.2s ease; }
        .nav-link:hover, .nav-link.active { color: var(--text-color); font-weight: 500; }
        .theme-toggle { background: none; border: none; color: var(--text-muted); font-family: var(--font-mono); font-size: 11px; cursor: pointer; margin-left: 2rem; outline: none; }
        .theme-toggle:hover { color: var(--text-color); }

        /* --- MAIN VIEW SYSTEM --- */
        main { min-height: 60vh; }
        .view-section { display: none; }
        .view-section.active-view { display: block; animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) both; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

        /* --- WORKS GRID --- */
        .works-grid { display: grid; grid-template-columns: repeat(1, 1fr); gap: var(--grid-gap); }
        @media (min-width: 600px) { .works-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 1024px) { .works-grid { grid-template-columns: repeat(3, 1fr); } }
        .work-item { position: relative; background-color: var(--border-color); aspect-ratio: 4 / 3; overflow: hidden; display: block; }
        .work-item img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(100%); transition: filter 0.5s ease, transform 0.5s ease; }
        .work-item:hover img { filter: grayscale(0%); transform: scale(1.02); }
        .work-info { padding: 10px 4px; display: flex; justify-content: space-between; align-items: baseline; }
        .work-title { font-weight: 400; }
        .work-meta { color: var(--text-muted); }

        /* --- WRITING LIST --- */
        .post-row { display: flex; flex-direction: column; border-bottom: 1px solid var(--border-color); padding: 1.5rem 0; transition: opacity 0.2s ease; }
        @media (min-width: 600px) { .post-row { flex-direction: row; justify-content: space-between; align-items: baseline; } }
        .post-row:hover { opacity: 0.6; }
        .post-date { color: var(--text-muted); min-width: 120px; margin-bottom: 0.25rem; }
        @media (min-width: 600px) { .post-date { margin-bottom: 0; } }
        .post-title { font-size: 14px; font-weight: 400; flex-grow: 1; }
        .post-category { color: var(--text-muted); margin-left: auto; }

        /* --- INFO AREA --- */
        .info-container { display: grid; grid-template-columns: 1fr; gap: 4rem; }
        @media (min-width: 768px) { .info-container { grid-template-columns: 1.5fr 1fr; } }
        
        .profile-header { margin-bottom: 2rem; }
        .profile-name { font-size: 24px; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 0.2rem; }
        .profile-title { font-size: 13px; color: var(--text-color); }
        
        .profile-text { font-size: 14px; line-height: 1.8; max-width: 600px; margin-bottom: 3rem; }
        .profile-text p { margin-bottom: 1.5rem; }
        .meta-group { margin-bottom: 2.5rem; }
        .meta-label { color: var(--text-muted); margin-bottom: 0.5rem; display: block; }
        .meta-list { list-style: none; }
        .meta-list li { margin-bottom: 0.6rem; }
        .meta-list a { border-bottom: 1px solid var(--text-muted); padding-bottom: 2px; }
        .meta-list a:hover { border-bottom-color: var(--text-color); }

        /* CONTACT FORM */
        .contact-section { border-top: 1px solid var(--border-color); padding-top: 2.5rem; max-width: 600px; }
        .contact-section h4 { font-size: 13px; font-weight: 500; margin-bottom: 1.5rem; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; font-size: 11px; color: var(--text-muted); margin-bottom: 0.5rem; }
        .form-group input, .form-group textarea {
            width: 100%; background: none; border: 1px solid var(--border-color);
            padding: 0.8rem; color: var(--text-color); font-family: var(--font-sans); font-size: 13px; outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus, .form-group textarea:focus { border-color: var(--text-color); }
        .form-submit-btn {
            background: none; border: 1px solid var(--text-color); color: var(--text-color);
            padding: 0.7rem 2rem; font-size: 11px; cursor: pointer; transition: background-color 0.2s, color 0.2s;
        }
        .form-submit-btn:hover { background-color: var(--text-color); color: var(--bg-color); }

        footer { margin-top: 16vh; padding-top: 2rem; border-top: 1px solid var(--border-color); display: flex; justify-content: space-between; color: var(--text-muted); }

        /* --- OVERLAY MODAL --- */
        .modal {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vw; height: 100vh;
            background-color: var(--modal-bg); z-index: 1000;
            display: none; justify-content: center; align-items: center;
            padding: 4vw; overflow-y: auto;
        }
        .modal.modal-active { display: flex; animation: fadeIn 0.3s ease both; }
        .modal-close {
            position: fixed; top: 3vw; right: 3vw; background: none; border: none;
            color: var(--text-color); font-family: var(--font-mono); font-size: 12px;
            cursor: pointer; z-index: 1010; outline: none;
        }
        .modal-close:hover { color: var(--text-muted); }
        
        .modal-content {
            width: 100%; max-width: 900px; margin: auto;
            display: grid; grid-template-columns: 1fr; gap: 2rem;
        }
        @media (min-width: 768px) {
            .modal-content { grid-template-columns: 1.3fr 1fr; align-items: center; }
        }
        
        .modal-media {
            width: 100%; background-color: var(--border-color);
            aspect-ratio: 4 / 3; overflow: hidden; display: flex; align-items: center; justify-content: center;
        }
        .modal-media img { width: 100%; height: 100%; object-fit: cover; }

        .modal-det-title { font-size: 18px; font-weight: 500; margin-bottom: 0.5rem; }
        .modal-det-meta { color: var(--text-muted); margin-bottom: 1.5rem; display: flex; gap: 1.5rem; }
        .modal-det-desc { font-size: 13px; line-height: 1.8; color: var(--text-color); margin-bottom: 2rem; white-space: pre-line; }
        
        .modal-btn {
            display: inline-block; padding: 0.6rem 1.2rem;
            border: 1px solid var(--text-color); font-size: 11px;
            transition: background-color 0.2s, color 0.2s;
        }
        .modal-btn:hover { background-color: var(--text-color); color: var(--bg-color); }
    </style>
</head>
<body>

    <header>
        <div class="logo mono" id="site-logo">PORTFOLIO</div>
        <nav>
            <a class="nav-link active mono" onclick="switchView('works')">Works</a>
            <a class="nav-link mono" onclick="switchView('writing')">Writing</a>
            <a class="nav-link mono" onclick="switchView('info')">Info</a>
            <button class="theme-toggle" onclick="toggleTheme()">[COLOR]</button>
        </nav>
    </header>

    <main>
        <section id="works" class="view-section active-view">
            <div class="works-grid" id="works-container"></div>
        </section>

        <section id="writing" class="view-section">
            <div class="writing-list" id="writing-container"></div>
        </section>

        <section id="info" class="view-section">
            <div class="info-container">
                <div>
                    <!-- ご指定通りの比率構成 -->
                    <div class="profile-header">
                        <h2 class="profile-name">suimeow / shunto takaya</h2>
                        <div class="profile-title">Visual Designer</div>
                    </div>
                    
                    <div class="profile-text" id="bio-container"></div>
                    
                    <!-- コンタクトフォーム（Netlify自動連携仕様） -->
                    <div class="contact-section">
                        <h4 class="mono">Contact / Inquiry</h4>
                        <form name="portfolio-contact" method="POST" data-netlify="true">
                            <!-- 通知転送用の設定（あなたのメールアドレスへ転送するための指定） -->
                            <input type="hidden" name="to" value="shntky@proton.me">
                            
                            <div class="form-group">
                                <label class="mono" for="name">Name</label>
                                <input type="text" id="name" name="name" required autocomplete="name">
                            </div>
                            <div class="form-group">
                                <label class="mono" for="email">Email</label>
                                <input type="email" id="email" name="email" required autocomplete="email">
                            </div>
                            <div class="form-group">
                                <label class="mono" for="message">Message</label>
                                <textarea id="message" name="message" rows="5" required></textarea>
                            </div>
                            <button type="submit" class="form-submit-btn mono">SEND MESSAGE</button>
                        </form>
                    </div>
                </div>

                <div class="profile-meta">
                    <div class="meta-group">
                        <span class="meta-label mono">Network</span>
                        <ul class="meta-list" id="social-container"></ul>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- ポップアップモダール -->
    <div id="work-modal" class="modal" onclick="closeModal(event)">
        <button class="modal-close mono" onclick="closeModal(force=true)">[ CLOSE ]</button>
        <div class="modal-content" onclick="event.stopPropagation()">
            <!-- 左：画像領域（動画リンクの場合もサムネイルがそのまま綺麗に拡大されます） -->
            <div class="modal-media" id="modal-media-target"></div>
            <!-- 右：テキスト領域 -->
            <div class="modal-details">
                <h3 class="modal-det-title" id="modal-title"></h3>
                <div class="modal-det-meta mono">
                    <span id="modal-date"></span>
                    <span id="modal-type"></span>
                </div>
                <p class="modal-det-desc" id="modal-desc"></p>
                <a href="#" target="_blank" rel="noopener" class="modal-btn mono" id="modal-link-btn">VIEW ON PLATFORM</a>
            </div>
        </div>
    </div>

    <footer class="mono">
        <div id="footer-copy">© 2026</div>
        <div>All rights reserved.</div>
    </footer>

    <!-- -----------------------------------------
         DATA & CONTROLLER
         ----------------------------------------- -->
    <script>
        const DATA = {
            logo: "suimeow/shunto takaya",
            copyright: "© 2026 suimeow",
            
            bio: [
                "デジタル領域を中心に、都市性、虚構性をモチーフにヴィジュアル表現を行っています。",
            ],

            socials: [
                { name: "X / Twitter", url: "https://x.com" },
                { name: "Instagram",   url: "https://instagram.com" },
                { name: "Vimeo",       url: "https://vimeo.com" },
                { name: "YouTube",     url: "https://youtube.com" }
            ],

            // ========================================================
            // 【作品データ設定】
            // platformName: ボタンの表記テキストを自由に変更できます (例: "X", "YouTube", "Vimeo", "Instagram" など)
            // ========================================================
            works: [
                { 
                    title: "Camouflaged",     
                    type: "University / Motion",   
                    date: "2026.05", 
                    img: "camouflaged.png", 
                    platformName: "Vimeo",
                    description: "都市における「広告募集」のポスターの虚構性について表現したVFX作品。",
                    link: "https://vimeo.com/1195011631?share=copy&fl=sv&fe=ci"
                },
                { 
                    title: "Fall in",     
                    type: "University / Motion",   
                    date: "2026.07", 
                    img: "fallin.png", 
                    platformName: "Vimeo",
                    description: "電柱を地中へと埋める行為から着想した都市性の再定義と陥落の表現。",
                    link: "https://vimeo.com/1209791994?share=copy&fl=sv&fe=ci"
                },
            ],

            writing: [
                { title: "Blog", category: "Technology",  date: "2026.03.12", link: "#" },
            ]
        };

        function initSite() {
            document.getElementById('site-logo').innerText = DATA.logo;
            document.getElementById('footer-copy').innerText = DATA.copyright;
            document.getElementById('bio-container').innerHTML = DATA.bio.map(p => `<p>${p}</p>`).join('');
            document.getElementById('social-container').innerHTML = DATA.socials.map(s => `<li><a href="${s.url}" target="_blank" rel="noopener">${s.name}</a></li>`).join('');

            document.getElementById('works-container').innerHTML = DATA.works.map((w, index) => `
                <div>
                    <div class="work-item" onclick="openModal(${index})">
                        <img src="${w.img}" alt="${w.title}">
                    </div>
                    <div class="work-info">
                        <span class="work-title"><a onclick="openModal(${index})">${w.title}</a></span>
                        <span class="work-meta mono">${w.date}</span>
                    </div>
                </div>
            `).join('');

            document.getElementById('writing-container').innerHTML = DATA.writing.map(post => `
                <a href="${post.link}" class="post-row">
                    <span class="post-date mono">${post.date}</span>
                    <span class="post-title">${post.title}</span>
                    <span class="post-category mono">${post.category}</span>
                </a>
            `).join('');
        }

        function openModal(index) {
            const item = DATA.works[index];
            if (!item) return;

            document.getElementById('modal-title').innerText = item.title;
            document.getElementById('modal-date').innerText = item.date;
            document.getElementById('modal-type').innerText = item.type;
            document.getElementById('modal-desc').innerText = item.description || "";
            
            const linkBtn = document.getElementById('modal-link-btn');
            if (item.link && item.link !== "#") {
                linkBtn.style.display = "inline-block";
                linkBtn.href = item.link;
                const platform = item.platformName ? item.platformName.toUpperCase() : "PLATFORM";
                linkBtn.innerText = `VIEW ON ${platform}`;
            } else {
                linkBtn.style.display = "none";
            }

            // 動画埋め込みではなく、純粋に画像を大きく表示する処理に変更
            const mediaTarget = document.getElementById('modal-media-target');
            mediaTarget.innerHTML = `<img src="${item.img}" alt="${item.title}">`;

            const modal = document.getElementById('work-modal');
            modal.classList.add('modal-active');
            document.body.classList.add('modal-open');
        }

        function closeModal(event, force = false) {
            if (force || event.target.id === 'work-modal') {
                const modal = document.getElementById('work-modal');
                modal.classList.remove('modal-active');
                document.body.classList.remove('modal-open');
            }
        }

        function switchView(viewId) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active-view'));
            const target = document.getElementById(viewId);
            if (target) target.classList.add('active-view');

            document.querySelectorAll('.nav-link').forEach(link => {
                link.classList.remove('active');
                if (link.getAttribute('onclick').includes(viewId)) link.classList.add('active');
            });
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function toggleTheme() { document.body.classList.toggle('dark-theme'); }
        window.addEventListener('DOMContentLoaded', initSite);
    </script>
</body>
</html>
